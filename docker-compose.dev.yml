version: "3.8"

services:
  # ── PostgreSQL Database ──────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: seel-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-seel_db}
      POSTGRES_USER: ${DB_USER:-seel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-seelpass}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-seel} -d ${DB_NAME:-seel_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - seel-network

  # ── Next.js Application (Development) ────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: seel-app-dev
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: "postgresql://${DB_USER:-seel}:${DB_PASSWORD:-seelpass}@db:5432/${DB_NAME:-seel_db}"
      DIRECT_URL: "postgresql://${DB_USER:-seel}:${DB_PASSWORD:-seelpass}@db:5432/${DB_NAME:-seel_db}"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-change-in-production}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@seeltransport.de}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-dev-password}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      ORS_API_KEY: ${ORS_API_KEY:-}
    env_file:
      - .env
    volumes:
      # Hot reload for source code changes
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./public:/app/public
      - ./next.config.mjs:/app/next.config.mjs
      - ./tsconfig.json:/app/tsconfig.json
      - ./tailwind.config.ts:/app/tailwind.config.ts
      - ./postcss.config.mjs:/app/postcss.config.mjs
      - node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - seel-network

volumes:
  postgres-data:
    driver: local
  node_modules:
    driver: local

networks:
  seel-network:
    driver: bridge
