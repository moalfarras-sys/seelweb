version: "3.8"

services:
  # ── PostgreSQL Database ──────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: seel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-seel_db}
      POSTGRES_USER: ${DB_USER:-seel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-seelpass}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-seel} -d ${DB_NAME:-seel_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - seel-network
    # Resource limits (adjust based on your needs)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: "1"
    #       memory: 512M
    #     reservations:
    #       cpus: "0.5"
    #       memory: 256M

  # ── Next.js Application ─────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - type=registry,ref=${DOCKER_IMAGE_CACHE:-seel-app:buildcache}
    image: seel-app:latest
    container_name: seel-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://${DB_USER:-seel}:${DB_PASSWORD:-seelpass}@db:5432/${DB_NAME:-seel_db}"
      DIRECT_URL: "postgresql://${DB_USER:-seel}:${DB_PASSWORD:-seelpass}@db:5432/${DB_NAME:-seel_db}"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production-32-chars}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@seeltransport.de}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-in-production}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      ORS_API_KEY: ${ORS_API_KEY:-}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - seel-network
    # Resource limits (adjust based on your needs)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: "2"
    #       memory: 1G
    #     reservations:
    #       cpus: "1"
    #       memory: 512M

volumes:
  postgres-data:
    driver: local

networks:
  seel-network:
    driver: bridge
